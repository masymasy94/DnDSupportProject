# .github/workflows/deploy-on-homeserver.yml — Build on GitHub, deploy on homeserver
#
# Triggers when a push contains RELEASE in the commit message.
# Example: git commit -m "v1.2 RELEASE - new campaign feature"
#
# Flow:
#   Job 0 (GitHub-hosted): Detect which services changed
#   Job 1 (GitHub-hosted): Maven build → upload artifacts
#   Job 2 (GitHub-hosted): Docker build + push to GHCR (only changed services)
#   Job 2b(GitHub-hosted): Retag unchanged services with new SHA (so deploy can pull all)
#   Job 3 (self-hosted):   Pull images → deploy → health check

name: Deploy to Homeserver

on:
  push:

env:
  APP_NAME: dndproject
  REPO_URL: https://github.com/${{ github.repository }}.git
  CLEAN_DEPLOY: ${{ contains(github.event.head_commit.message, 'CLEAN') }}
  REGISTRY: ghcr.io/masymasy94/dndsupportproject
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────
  # Job 0: Detect which services have changed
  # ──────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'RELEASE')
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
      has_changes: ${{ steps.filter.outputs.has_changes }}
      changed_list: ${{ steps.filter.outputs.changed_list }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed services
        id: filter
        run: |
          ALL_SERVICES='["auth-service","user-service","character-service","campaign-service","combat-service","asset-service","chat-service","search-service","notification-service","compendium-service","document-qa-service"]'

          BEFORE="${{ github.event.before }}"

          # First push to branch or force push — build all
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            echo "First push — building all services"
            echo "matrix={\"service\":$ALL_SERVICES}" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_list=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          echo "Changed files:"
          echo "$CHANGED"

          # Global changes that affect all services → rebuild all
          if echo "$CHANGED" | grep -qE '^(pom\.xml|services/common/|services/pom\.xml|\.github/workflows/)'; then
            echo "Global change detected — building all services"
            echo "matrix={\"service\":$ALL_SERVICES}" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_list=all" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Detect individual changed services
          JSON="["
          SEP=""
          LIST=""
          for svc in $(echo "$CHANGED" | grep -oP '^services/\K[^/]+' | sort -u); do
            # Only include known services (skip common, pom.xml, etc.)
            if echo "$ALL_SERVICES" | grep -q "\"$svc\""; then
              JSON="${JSON}${SEP}\"${svc}\""
              LIST="${LIST}${SEP}${svc}"
              SEP=","
            fi
          done
          JSON="${JSON}]"

          if [ "$JSON" == "[]" ]; then
            echo "No service changes detected"
            echo "matrix={\"service\":$ALL_SERVICES}" >> "$GITHUB_OUTPUT"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "changed_list=" >> "$GITHUB_OUTPUT"
          else
            echo "Changed services: $JSON"
            echo "matrix={\"service\":$JSON}" >> "$GITHUB_OUTPUT"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "changed_list=$LIST" >> "$GITHUB_OUTPUT"
          fi

  # ──────────────────────────────────────────────
  # Job 1: Maven build on GitHub-hosted runner
  # ──────────────────────────────────────────────
  maven-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Maven build
        run: mvn clean install -DskipTests -q

      - name: Upload Maven artifacts
        uses: actions/upload-artifact@v4
        with:
          name: maven-artifacts
          retention-days: 1
          path: services/*/*/target/quarkus-app/

  # ──────────────────────────────────────────────
  # Job 2: Docker build + push to GHCR (only changed services)
  # ──────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: [maven-build, detect-changes]
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Maven artifacts
        uses: actions/download-artifact@v4
        with:
          name: maven-artifacts
          path: services

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sanitize branch name
        id: branch
        run: echo "slug=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ matrix.service }}:${{ steps.branch.outputs.slug }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ──────────────────────────────────────────────
  # Job 2b: Retag unchanged services (latest → sha-xxx)
  # ──────────────────────────────────────────────
  retag-unchanged:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: >-
      needs.detect-changes.outputs.has_changes == 'true' &&
      needs.detect-changes.outputs.changed_list != 'all'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Retag unchanged services
        env:
          CHANGED: ${{ needs.detect-changes.outputs.changed_list }}
        run: |
          ALL="auth-service user-service character-service campaign-service combat-service asset-service chat-service search-service notification-service compendium-service document-qa-service"

          for svc in $ALL; do
            if ! echo ",$CHANGED," | grep -q ",$svc,"; then
              echo "Retagging $svc: latest → ${{ env.IMAGE_TAG }}"
              docker buildx imagetools create \
                --tag "${{ env.REGISTRY }}/$svc:${{ env.IMAGE_TAG }}" \
                "${{ env.REGISTRY }}/$svc:latest"
            else
              echo "Skipping $svc (rebuilt)"
            fi
          done

  # ──────────────────────────────────────────────
  # Job 3: Deploy on self-hosted runner
  # ──────────────────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: [build-and-push, retag-unchanged, detect-changes]
    if: >-
      !cancelled() &&
      needs.build-and-push.result == 'success' &&
      (needs.retag-unchanged.result == 'success' || needs.retag-unchanged.result == 'skipped')
    environment:
      name: homeserver
      url: http://dndproject.local

    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy or update
        id: deploy
        env:
          IMAGE_TAG: sha-${{ github.sha }}
          CHANGED_SERVICES: ${{ needs.detect-changes.outputs.changed_list }}
        run: |
          set -o pipefail
          echo "::group::Deploy output"
          /home/masy/Desktop/docker/apps/scripts/ci-deploy.sh "$REPO_URL" "$APP_NAME" "${{ github.ref_name }}" 2>&1 | tee /tmp/deploy-${APP_NAME}.log
          echo "::endgroup::"

      - name: Collect status
        id: status
        if: always()
        run: |
          COMPOSE="/home/masy/Desktop/docker/apps/deployments/${APP_NAME}/docker-compose.deploy.yml"
          if [ -f "$COMPOSE" ]; then
            TOTAL=$(docker compose -f "$COMPOSE" -p "$APP_NAME" ps -q 2>/dev/null | wc -l)
            RUNNING=$(docker compose -f "$COMPOSE" -p "$APP_NAME" ps --status running -q 2>/dev/null | wc -l)
            SERVICES=$(docker compose -f "$COMPOSE" -p "$APP_NAME" ps --format "table {{.Name}}\t{{.Status}}" 2>/dev/null || echo "N/A")
          else
            TOTAL=0
            RUNNING=0
            SERVICES="No compose file found"
          fi
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "running=$RUNNING" >> "$GITHUB_OUTPUT"
          {
            echo "services<<EOF"
            echo "$SERVICES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write summary
        if: always()
        env:
          CHANGED_SERVICES: ${{ needs.detect-changes.outputs.changed_list }}
        run: |
          echo "## Deployment: \`${APP_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.deploy.outcome }}" == "success" ]; then
            echo "> **Status:** Deployed successfully" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> **Status:** Deployment failed" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| App | \`${APP_NAME}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| URL | http://${APP_NAME}.local |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Branch | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image tag | \`sha-${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Changed services | \`${CHANGED_SERVICES:-all}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Containers | ${{ steps.status.outputs.running }}/${{ steps.status.outputs.total }} running |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Containers" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.status.outputs.services }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.deploy.outcome }}" != "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Deploy log (last 30 lines)" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            tail -30 /tmp/deploy-${APP_NAME}.log >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No log available" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          fi
