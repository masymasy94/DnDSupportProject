# Application
quarkus.application.name=document-qa-service
quarkus.http.port=8091

# Vault Configuration
%dev.quarkus.vault.url=http://localhost:8200
%dev.quarkus.vault.authentication.client-token=dnd-dev-token
quarkus.vault.url=${vault.url}
quarkus.vault.authentication.client-token=${vault.token}
quarkus.vault.kv-secret-engine-version=2
quarkus.vault.secret-config-kv-path.vault=dnd-platform/common/vault
quarkus.vault.secret-config-kv-path.db=dnd-platform/common/database
quarkus.vault.secret-config-kv-path.rabbitmq=dnd-platform/common/rabbitmq
quarkus.vault.secret-config-kv-path.minio=dnd-platform/common/minio
quarkus.vault.secret-config-kv-path.docqa-db=dnd-platform/document-qa-service/database
quarkus.vault.secret-config-kv-path.encryption=dnd-platform/document-qa-service/encryption
quarkus.vault.secret-config-kv-path.jwt=dnd-platform/jwt
quarkus.vault.secret-config-kv-path.jwt-config=dnd-platform/auth-service/jwt-config
quarkus.vault.connect-timeout=5S
quarkus.vault.read-timeout=5S

# Security - JWT Configuration
quarkus.smallrye-jwt.enabled=true
mp.jwt.verify.publickey=${jwt.public-key}
mp.jwt.verify.issuer=${jwt-config.issuer}

# Database
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${db.username}
quarkus.datasource.password=${db.password}
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/document_qa_db
quarkus.datasource.jdbc.url=${docqa-db.url}
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=true

# Flyway
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0
quarkus.flyway.locations=classpath:db/migration
quarkus.flyway.repair-at-start=true

# MinIO Configuration
%dev.minio.endpoint=http://localhost:9000
minio.endpoint=${MINIO_ENDPOINT}
minio.bucket=${MINIO_BUCKET}
minio.access-key=${minio.access-key}
minio.secret-key=${minio.secret-key}

# RabbitMQ — incoming: document upload events from asset-service
mp.messaging.incoming.document-uploaded-in.connector=smallrye-rabbitmq
mp.messaging.incoming.document-uploaded-in.exchange.name=dnd.events
mp.messaging.incoming.document-uploaded-in.exchange.type=topic
mp.messaging.incoming.document-uploaded-in.queue.name=docqa.document.uploaded
mp.messaging.incoming.document-uploaded-in.routing-keys=document.uploaded
mp.messaging.incoming.document-uploaded-in.queue.durable=true
mp.messaging.incoming.document-uploaded-in.content-type-override=application/json

# RabbitMQ — outgoing: notify ingestion result back to asset-service
mp.messaging.outgoing.document-ingested-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.document-ingested-out.exchange.name=dnd.events
mp.messaging.outgoing.document-ingested-out.exchange.type=topic
mp.messaging.outgoing.document-ingested-out.default-routing-key=document.ingested
mp.messaging.outgoing.document-ingested-out.default-content-type=application/json

# RabbitMQ connection
%dev.rabbitmq-host=localhost
%dev.rabbitmq-port=5672
%dev.rabbitmq-virtual-host=dnd_vhost
rabbitmq-host=${rabbitmq.host}
rabbitmq-port=${rabbitmq.port}
rabbitmq-username=${rabbitmq.username}
rabbitmq-password=${rabbitmq.password}
rabbitmq-virtual-host=${rabbitmq.virtual-host}

# LangChain4j — chat models created dynamically by DynamicChatModelProvider
# Embedding: in-process ONNX (all-minilm-l6-v2, 384 dimensions)
quarkus.langchain4j.chat-model.provider=openai
quarkus.langchain4j.embedding-model.provider=dev.langchain4j.model.embedding.onnx.allminilml6v2.AllMiniLmL6V2EmbeddingModel
quarkus.langchain4j.openai.base-url=https://api.groq.com/openai/v1
quarkus.langchain4j.openai.api-key=${GROQ_API_KEY}
quarkus.langchain4j.openai.chat-model.model-name=llama-3.3-70b-versatile
quarkus.langchain4j.openai.timeout=30s
quarkus.langchain4j.openai.log-requests=true
quarkus.langchain4j.openai.log-responses=true

# RAG Configuration
rag.chunk.size=1000
rag.chunk.overlap=200

# Groq API key (from .env.groq)
llm.groq-api-key=${GROQ_API_KEY}

# Encryption key for user API keys (from Vault)
encryption.key=${encryption.key}

# OpenAPI / Swagger
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/q/swagger-ui
quarkus.swagger-ui.title=Document Q&A Service API

# Health
quarkus.smallrye-health.root-path=/q/health

# Metrics
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true
quarkus.micrometer.export.prometheus.path=/q/metrics

# OpenTelemetry / Jaeger
quarkus.otel.enabled=true
quarkus.otel.exporter.otlp.endpoint=http://jaeger:4317
quarkus.otel.exporter.otlp.traces.endpoint=http://jaeger:4317

# Logging - Console (development)
%dev.quarkus.log.level=INFO
%dev.quarkus.log.console.format=%d{HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
%dev.quarkus.log.console.color=true
%dev.quarkus.log.console.json=false

# Logging - JSON (production/docker)
quarkus.log.level=INFO
quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.excluded-keys=sequence
quarkus.log.console.json.additional-field."service".value=${quarkus.application.name}
quarkus.log.console.json.additional-field."environment".value=${ENVIRONMENT:dev}

# CORS (for development)
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-allow-credentials=true
quarkus.http.cors.access-control-max-age=24H
