# Integration Test Configuration — H2 in-memory, no Docker required

# --- Environment ---
ENVIRONMENT=test

# --- Vault: disabled ---
quarkus.vault.url=
quarkus.vault.devservices.enabled=false

# --- Database: H2 in-memory ---
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

db.username=sa
db.password=
docqa-db.url=jdbc:h2:mem:testdb

# --- Flyway: disabled ---
quarkus.flyway.migrate-at-start=false

# --- MinIO: dummy ---
MINIO_ENDPOINT=http://localhost:19000
MINIO_BUCKET=test-bucket
minio.endpoint=http://localhost:19000
minio.bucket=test-bucket
minio.access-key=test
minio.secret-key=test

# --- RabbitMQ: incoming consumer disabled ---
mp.messaging.incoming.document-uploaded-in.enabled=false
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest
rabbitmq-virtual-host=/
quarkus.rabbitmq.devservices.enabled=false

# --- LangChain4j: dummy values, no real API call in tests ---
GROQ_API_KEY=test-key
quarkus.langchain4j.openai.api-key=test-key
llm.groq-api-key=test-key

# --- Encryption ---
encryption.key=test-encryption-key-32-characters-x

# --- JWT: disabled (tests use @TestSecurity) ---
quarkus.smallrye-jwt.enabled=false
mp.jwt.verify.publickey=NONE
mp.jwt.verify.issuer=test-issuer
jwt.public-key=NONE
jwt-config.issuer=test-issuer

# --- Telemetry ---
quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true

# --- Logging ---
quarkus.log.console.json=false
quarkus.log.level=INFO
