# Integration Test Configuration — H2 in-memory, no Docker required

# --- Environment ---
ENVIRONMENT=test

# --- Vault: disabled ---
quarkus.vault.url=
quarkus.vault.devservices.enabled=false

# --- Database: PostgreSQL via PostgreSQLTestResource (QuarkusTestResourceLifecycleManager) ---
quarkus.datasource.db-kind=postgresql
# Placeholder — PostgreSQLTestResource overrides jdbc.url/username/password at runtime


quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

db.username=test
db.password=test
auth-db.url=jdbc:postgresql://dummy:5432/dummy

# --- Flyway: disabled ---
quarkus.flyway.migrate-at-start=false

# --- RabbitMQ: keep connectors but disable dev services ---
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest
rabbitmq-virtual-host=/
quarkus.rabbitmq.devservices.enabled=false

# --- Redis: disabled ---
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.devservices.enabled=false
quarkus.smallrye-health.check."io.quarkus.redis.runtime.client.health.RedisHealthCheck".enabled=false

# --- REST Client: dummy URL (tests use mocks or expect failures) ---
quarkus.rest-client.rest_client_user_service.url=http://localhost:19999
rest-client.url=http://localhost:19999
service-token.rest_client_user_service_auth=test-token
service-token.rest_client_user_service_auth_http_header=x-service-token

# --- JWT: test RSA keys ---
# THESE ARE TEST-ONLY KEYS. DO NOT USE IN PRODUCTION.
# Generated specifically for integration tests via `openssl genrsa -out test-private.pem 2048`.
# Inline format required because main application.properties uses ${jwt.private-key} expression
# resolution rather than smallrye.jwt.sign.key.location, and overriding to empty fails MP-JWT validation.
jwt.private-
jwt.public-
mp.jwt.verify.issuer=https://test-issuer
jwt.issuer=https://test-issuer
jwt.access-token-expiry-seconds=3600
jwt.refresh-token-expiry-days=30
jwt-config.issuer=https://test-issuer
jwt-config.access-token-expiry-seconds=3600
jwt-config.refresh-token-expiry-days=30

# --- Password reset ---
password-reset.token-expiry-minutes=15

# --- OTP Login ---
otp-login.token-expiry-minutes=5

# --- Telemetry ---
quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true

# --- Logging ---
quarkus.log.console.json=false
quarkus.log.level=INFO
