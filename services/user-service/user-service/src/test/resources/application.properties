# ===========================
# Integration Test Configuration
# ===========================
# PostgreSQL via PostgreSQLTestResource (requires Docker).

# --- Vault: disabled ---
quarkus.vault.url=
quarkus.vault.devservices.enabled=false

# --- Database: PostgreSQL via PostgreSQLTestResource (QuarkusTestResourceLifecycleManager) ---
quarkus.datasource.db-kind=postgresql
# Placeholder — PostgreSQLTestResource overrides jdbc.url/username/password at runtime


quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# Override Vault-sourced DB properties
db.username=test
db.password=test
user-db.url=jdbc:postgresql://dummy:5432/dummy

# --- Flyway: disabled (Hibernate generates schema) ---
quarkus.flyway.migrate-at-start=false

# --- RabbitMQ: keep connector but disable dev services ---
# Channel stays configured as rabbitmq — Quarkus won't try to connect at build time.
# At runtime, messages are fire-and-forget; connection failure is logged but doesn't block tests.
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest
rabbitmq-virtual-host=/
quarkus.rabbitmq.devservices.enabled=false

# --- Redis: disabled for tests ---
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.devservices.enabled=false

# --- JWT: disabled (tests use @TestSecurity) ---
quarkus.smallrye-jwt.enabled=false
mp.jwt.verify.publickey=NONE
mp.jwt.verify.issuer=test-issuer
jwt.public-key=NONE
jwt-config.issuer=test-issuer

# --- Telemetry: off ---
quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true

# --- Health: disable Redis health check (no Redis in tests) ---
quarkus.smallrye-health.check."io.quarkus.redis.runtime.client.health.RedisHealthCheck".enabled=false

# --- Logging: human-readable ---
quarkus.log.console.json=false
quarkus.log.level=INFO
