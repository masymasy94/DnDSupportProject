# ===========================
# Integration Test Configuration
# ===========================
# Elasticsearch via DevServices. Redis disabled.

# --- Vault: disabled ---
quarkus.vault.url=
quarkus.vault.devservices.enabled=false

# --- Override Vault-sourced properties ---
search-config.elasticsearch-scheme=http
search-config.elasticsearch-host=localhost
search-config.elasticsearch-port=9200
search-config.auth-service-url=http://localhost:8081
redis.hosts=redis://localhost:6379
vault.url=http://localhost:8200
vault.token=test-token

# --- Elasticsearch: let DevServices manage it ---
# The Vault overrides above satisfy the property expansion. If Docker
# is running, Quarkus DevServices starts a real Elasticsearch container.
# If Docker is NOT running, the health check will fail — but the test
# config is at least valid.

# --- Redis: disabled for tests ---
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.devservices.enabled=false

# --- JWT: disabled (tests use @TestSecurity) ---
quarkus.smallrye-jwt.enabled=false
mp.jwt.verify.publickey=NONE
mp.jwt.verify.issuer=test-issuer
jwt.public-key=NONE
jwt-config.issuer=test-issuer

# --- Telemetry: off ---
quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true

# --- Health: disable external-service health checks (no ES/Redis in tests) ---
quarkus.smallrye-health.check."io.quarkus.redis.runtime.client.health.RedisHealthCheck".enabled=false
quarkus.smallrye-health.check."io.quarkus.elasticsearch.restclient.lowlevel.runtime.health.ElasticsearchHealthCheck".enabled=false

# --- RabbitMQ: disabled ---
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest
rabbitmq-virtual-host=/
quarkus.rabbitmq.devservices.enabled=false

# --- Logging: human-readable ---
quarkus.log.console.json=false
quarkus.log.level=INFO
