<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="color-scheme" content="light dark">
    <meta name="supported-color-schemes" content="light dark">
    <title>Welcome to D&amp;D Platform</title>
    <!--[if mso]>
    <noscript>
        <xml>
            <o:OfficeDocumentSettings>
                <o:PixelsPerInch>96</o:PixelsPerInch>
            </o:OfficeDocumentSettings>
        </xml>
    </noscript>
    <![endif]-->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400&family=Plus+Jakarta+Sans:wght@300;400;500&display=swap');

        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        body { margin: 0; padding: 0; width: 100% !important; height: 100% !important; }

        @media only screen and (max-width: 620px) {
            .email-container { width: 100% !important; max-width: 100% !important; }
            .fluid-padding { padding-left: 28px !important; padding-right: 28px !important; }
            .hero-title { font-size: 26px !important; }
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #1a1408; font-family: 'Plus Jakarta Sans', 'Segoe UI', Helvetica, Arial, sans-serif;">

    <!-- Preheader -->
    <div style="display: none; max-height: 0; overflow: hidden; mso-hide: all;" aria-hidden="true">
        Your adventure begins now.
        &zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;
    </div>

    <!-- Outer wrapper — deep gold to warm charcoal gradient -->
    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: linear-gradient(170deg, #12100a 0%, #2a2010 30%, #3a3020 60%, #484030 100%);">
        <tr>
            <td align="center" style="padding: 64px 16px;">

                <!-- Email container -->
                <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="480" class="email-container" style="max-width: 480px; width: 100%;">
                    <tr>
                        <td align="center">

                            <!-- Liquid Glass card — gold-tinted -->
                            <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background: linear-gradient(160deg, rgba(255,230,180,0.14) 0%, rgba(255,215,150,0.07) 40%, rgba(255,200,130,0.03) 100%); border-radius: 24px; border: 1px solid rgba(255,220,160,0.18); box-shadow: 0 8px 32px rgba(60,40,10,0.35), 0 0 80px rgba(200,160,50,0.06), inset 0 1px 0 rgba(255,240,200,0.25), inset 0 -1px 0 rgba(255,220,160,0.04);">
                                <tr>
                                    <td style="padding: 60px 48px; text-align: center;" class="fluid-padding">

                                        <!-- Diamond sigil — gold tint -->
                                        <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center">
                                            <tr>
                                                <td style="width: 40px; height: 40px; text-align: center; vertical-align: middle;">
                                                    <div style="width: 14px; height: 14px; border: 1.5px solid rgba(220,185,100,0.5); transform: rotate(45deg); margin: 0 auto; box-shadow: 0 0 10px rgba(200,170,60,0.15);"></div>
                                                </td>
                                            </tr>
                                        </table>

                                        <h1 class="hero-title" style="font-family: 'Cinzel', Georgia, serif; color: #d4a840; font-size: 28px; font-weight: 400; margin: 32px 0 0 0; letter-spacing: 0.5px; line-height: 1.3; text-shadow: 0 0 20px rgba(212,168,64,0.2);">
                                            Welcome, Adventurer
                                        </h1>

                                        <p style="font-family: 'Plus Jakarta Sans', 'Segoe UI', Helvetica, sans-serif; color: rgba(255,240,210,0.6); font-size: 15px; line-height: 1.75; margin: 20px 0 0 0; font-weight: 300;">
                                            Your account is ready. Create your first character,
                                            find a campaign, and begin your story.
                                        </p>

                                        <!-- CTA Button — red glass -->
                                        <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" style="margin-top: 36px;">
                                            <tr>
                                                <td style="border-radius: 14px; background: linear-gradient(135deg, #d83838 0%, #b82828 100%); border: 1px solid rgba(255,100,100,0.35); box-shadow: 0 4px 20px rgba(216,56,56,0.3), inset 0 1px 0 rgba(255,255,255,0.18);" align="center">
                                                    <a href="http://192.168.3.200" target="_blank" style="font-family: 'Plus Jakarta Sans', 'Segoe UI', Helvetica, sans-serif; font-size: 13px; font-weight: 500; color: #ffffff; text-decoration: none; display: inline-block; padding: 14px 36px; letter-spacing: 0.5px;">
                                                        Get Started
                                                    </a>
                                                </td>
                                            </tr>
                                        </table>

                                        <!-- Subtle separator -->
                                        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="36" align="center" style="margin-top: 48px;">
                                            <tr><td style="height: 1px; background: linear-gradient(90deg, transparent, rgba(220,190,120,0.15), transparent);"></td></tr>
                                        </table>

                                        <p style="font-family: 'Plus Jakarta Sans', 'Segoe UI', Helvetica, sans-serif; color: rgba(220,190,120,0.22); font-size: 12px; font-weight: 400; margin: 20px 0 0 0; line-height: 1.5;">
                                            May your rolls be natural 20s.
                                        </p>

                                    </td>
                                </tr>
                            </table>

                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>
</body>
</html>
