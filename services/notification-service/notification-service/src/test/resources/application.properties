# Integration Test Configuration — H2 in-memory, no Docker required

# --- Vault: disabled ---
quarkus.vault.url=
quarkus.vault.devservices.enabled=false

# --- Database: PostgreSQL via Dev Services ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
# Dev Services overrides the interpolated URL at runtime


quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

db.username=sa
db.password=
notification-db.url=jdbc:postgresql://placeholder:5432/placeholder

# --- Flyway: disabled ---
quarkus.flyway.migrate-at-start=false

# --- RabbitMQ: incoming consumer disabled via enabled=false ---
mp.messaging.incoming.email-requests-in.enabled=false
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest
rabbitmq-virtual-host=/
quarkus.rabbitmq.devservices.enabled=false

# --- Redis: not used in tests ---
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.devservices.enabled=false
quarkus.smallrye-health.check."io.quarkus.redis.runtime.client.health.RedisHealthCheck".enabled=false

# --- Mailer: mock mode ---
quarkus.mailer.mock=true
quarkus.mailer.from=test@example.com
MAILER_FROM=test@example.com
MAILER_USERNAME=test
MAILER_PASSWORD=test

# --- Telemetry: off ---
quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true

# --- Logging ---
quarkus.log.console.json=false
quarkus.log.level=INFO
