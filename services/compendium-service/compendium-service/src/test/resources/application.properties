# Integration Test Configuration — H2 in-memory, no Docker required

# --- Vault: disabled ---
quarkus.vault.url=
quarkus.vault.devservices.enabled=false

# --- Database: H2 in-memory with Flyway ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true
# Dev Services overrides the interpolated URL at runtime


quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

db.username=sa
db.password=
compendium-db.url=jdbc:postgresql://placeholder:5432/placeholder

# --- Flyway: disabled (H2 doesn't support SMALLSERIAL in migration) ---
quarkus.flyway.migrate-at-start=false

# --- Redis: disabled (Quarkus cache uses in-process Caffeine, not Redis) ---
quarkus.redis.hosts=redis://localhost:6379
quarkus.redis.devservices.enabled=false
quarkus.smallrye-health.check."io.quarkus.redis.runtime.client.health.RedisHealthCheck".enabled=false

# --- Cache: disabled for tests ---
# Caffeine cache pollutes state across @InjectMock-driven test methods (cache survives between
# tests in the same class). Cache correctness is verified by Caffeine's own tests; tests here
# focus on REST + business logic behavior, not cache semantics.
quarkus.cache.enabled=false

# --- JWT: disabled ---
quarkus.smallrye-jwt.enabled=false
mp.jwt.verify.publickey=NONE
mp.jwt.verify.issuer=test-issuer
jwt.public-key=NONE
jwt-config.issuer=test-issuer


# --- Telemetry ---
quarkus.otel.enabled=false
quarkus.otel.sdk.disabled=true

# --- Environment ---
ENVIRONMENT=test

# --- Logging ---
quarkus.log.console.json=false
quarkus.log.level=INFO
